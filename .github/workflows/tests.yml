name: Tests

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

env:
  CI_IMAGE: ghcr.io/ondottr/php-sf-ci:latest

jobs:
  phpunit:
    name: PHPUnit
    runs-on: self-hosted

    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout Platform
        uses: actions/checkout@v6
        with:
          path: platform

      - name: Checkout template
        uses: actions/checkout@v6
        with:
          repository: Ondottr/PHP_SF_Template
          path: template

      - name: Wire Platform into template
        run: |
          rm -rf template/Platform
          cp -r platform template/Platform

      - name: Prepare environment
        working-directory: template
        run: |
          cp config/constants.example.php config/constants.php
          cp -r staging/overlay/. .
          {
            echo "APP_ENV=test"
            echo 'APP_SECRET=$ecretf0rt3st'
            echo "REDIS_CACHE_URL=redis://ci-redis-${{ github.run_id }}:6379/10"
            echo "MEMCACHED_SERVER=ci-memcached-${{ github.run_id }}"
            echo "MEMCACHED_PORT=11211"
            echo "MESSENGER_TRANSPORT_DSN=amqp://guest:guest@localhost/%2f"
            echo "ADMIN_PASSWORD=admin"
            echo "ADMIN_EMAIL=admin@example.com"
          } > .env

      - name: Start services
        run: |
          docker network create ci-platform-${{ github.run_id }}
          docker run -d --name ci-redis-${{ github.run_id }} \
            --network ci-platform-${{ github.run_id }} redis:7-alpine
          docker run -d --name ci-memcached-${{ github.run_id }} \
            --network ci-platform-${{ github.run_id }} memcached:1-alpine

      - name: Cache composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('template/composer.lock') }}
          restore-keys: composer-

      - name: Composer validate & install
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/template:/app" \
            -v ~/.composer/cache:/root/.composer/cache \
            -w /app \
            ${{ env.CI_IMAGE }} \
            sh -c "composer validate && composer install --no-interaction --prefer-dist --no-progress"

      - name: PHPUnit
        run: |
          docker run --rm \
            --network ci-platform-${{ github.run_id }} \
            -v "${{ github.workspace }}/template:/app" \
            -w /app \
            -e APP_ENV=test \
            ${{ env.CI_IMAGE }} \
            vendor/bin/phpunit \
              --bootstrap tests/bootstrap.php \
              --configuration phpunit.xml.dist \
              Platform/tests

      - name: Teardown services
        if: always()
        run: |
          docker rm -f ci-redis-${{ github.run_id }} ci-memcached-${{ github.run_id }} 2>/dev/null || true
          docker network rm ci-platform-${{ github.run_id }} 2>/dev/null || true
