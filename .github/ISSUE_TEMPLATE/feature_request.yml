name: Feature Request
description: Suggest an improvement or new capability for the PHP Simple Framework
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        For template project improvements (project structure, Docker setup, tooling), open an issue in the
        [template repository](https://github.com/Ondottr/PHP_SF_Template/issues) instead.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What can you not do today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you would like to happen. Code examples are welcome.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - Routing / #[Route]
        - Middleware
        - Controllers / AbstractController
        - Views / AbstractView
        - Entities / AbstractEntity
        - Validation
        - Cache (APCu / Redis / Memcached)
        - Session
        - Translation
        - Kernel / Boot
        - Helper functions
        - New component
        - Other
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
    validations:
      required: false
